name: Feature request
description: Suggest an idea for AI Vigil
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
      placeholder: I want to monitor ... because ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should AI Vigil do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or different design you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Model checks
        - Golden Set regression
        - Alerting
        - Dashboard
        - Docker/deployment
        - Documentation
        - Other
