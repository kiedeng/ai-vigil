name: Bug report
description: Report a reproducible problem in AI Vigil
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include enough detail for maintainers to reproduce it.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and the expected behavior.
      placeholder: Tell us what you saw and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Configure ...
        3. Run ...
        4. See error ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: main, commit SHA, or release tag
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose SQLite
        - Docker Compose MySQL
        - Local Python/Vue
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have removed secrets, tokens, and private URLs from logs.
          required: true
        - label: I searched existing issues before opening this one.
          required: true
